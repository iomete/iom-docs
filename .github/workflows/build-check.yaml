name: Build Check

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: build-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --no-progress --frozen-lockfile

      - name: Build
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: yarn build
        env:
          NODE_OPTIONS: --max-old-space-size=6144
