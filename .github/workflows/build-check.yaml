name: Build Check

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: build-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --no-progress --frozen-lockfile

      - name: Build
        # NODE_OPTIONS raises Node's max heap to 6 GB. The default ~4 GB was
        # hit intermittently (FATAL: heap out of memory) during static-site
        # generation as the site grew. Mirrors the snapshot-gate workflow.
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: yarn build
        env:
          NODE_OPTIONS: --max-old-space-size=6144
