name: Snapshot Gate

# Validates pure dependency-bump PRs by building the docs site against both
# `merge-base(origin/main, HEAD)` and the PR head, normalizing webpack content
# hashes + sourcemap comments + JSON-LD `dateModified`, and diffing the
# emitted HTML. Any non-empty diff fails unless the PR carries the
# `snapshot-acknowledged` label.
#
# The workflow runs on every PR (no trigger-level path filter) so it can be
# marked as a required status check in branch protection. A runtime scope
# check categorizes the PR into one of three states and exits accordingly:
#
#   scope=dep    PR has dep changes (package.json/yarn.lock) and nothing
#                else, OR the PR carries the `dependencies` label (Dependabot
#                auto-adds this; humans/other bots can also apply it as an
#                explicit "treat as dep PR" signal). Full gate runs.
#
#   scope=mixed  PR changes both dep files and other files. The gate can't
#                cleanly attribute HTML diffs to dep changes vs intentional
#                content changes, so it skips with an explanatory comment
#                and exits success (the build-check workflow still validates
#                the build itself).
#
#   scope=none   PR has no dep changes at all (typical doc/blog/UI PR). The
#                gate isn't applicable; exits success silently (no comment).

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: snapshot-gate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  snapshot-gate:
    name: HTML Snapshot Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Determine merge-base
        id: base
        run: |
          BASE=$(git merge-base origin/main HEAD)
          echo "sha=$BASE" >> "$GITHUB_OUTPUT"
          echo "Base commit: $BASE"

      - name: Check scope
        id: scope
        # Categorize the PR as dep / mixed / none.
        # Label override: if `dependencies` label is present, treat as dep PR
        # regardless of file paths (Dependabot auto-applies this; humans can
        # apply it to force the gate on a mixed-scope PR).
        run: |
          BASE="${{ steps.base.outputs.sha }}"
          HAS_LABEL='${{ contains(github.event.pull_request.labels.*.name, ''dependencies'') }}'

          CHANGED=$(git diff --name-only "$BASE..HEAD")
          DEP_FILES=$(echo "$CHANGED" | grep -E '^(package\.json|yarn\.lock)$' || true)
          NON_DEP_FILES=$(echo "$CHANGED" | grep -v -E '^(package\.json|yarn\.lock)$' || true)

          if [ "$HAS_LABEL" = "true" ]; then
            SCOPE=dep
            REASON="\`dependencies\` label present"
          elif [ -n "$DEP_FILES" ] && [ -z "$NON_DEP_FILES" ]; then
            SCOPE=dep
            REASON="pure dep change (only package.json/yarn.lock)"
          elif [ -n "$DEP_FILES" ] && [ -n "$NON_DEP_FILES" ]; then
            SCOPE=mixed
            REASON="dep change + non-dep files"
          else
            SCOPE=none
            REASON="no dep changes"
          fi

          echo "scope=$SCOPE" >> "$GITHUB_OUTPUT"
          {
            echo 'non_dep_files<<EOF'
            echo "$NON_DEP_FILES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          echo "Scope: $SCOPE ($REASON)"
          if [ "$SCOPE" = "mixed" ]; then
            echo "::notice::Snapshot gate skipped — mixed-scope PR"
            echo "Non-dep files:"
            echo "$NON_DEP_FILES" | sed 's/^/  /'
          fi

      - name: Build base snapshot
        id: build_base
        # continue-on-error so a base-build failure (rare — implies main is broken)
        # still posts a clear sticky comment instead of just a red check.
        continue-on-error: true
        if: steps.scope.outputs.scope == 'dep'
        # NODE_OPTIONS raises Node's max heap to 6 GB. Default ~4 GB was
        # hit (FATAL: heap out of memory) when running two Docusaurus
        # builds back-to-back on the standard 7 GB Ubuntu runner.
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          git checkout ${{ steps.base.outputs.sha }}
          rm -rf node_modules build .docusaurus
          yarn install --frozen-lockfile --no-progress
          yarn build
          mv build build-base

      - name: Build PR head snapshot
        id: build_head
        # continue-on-error so a head-build failure (common: dep bump breaks build)
        # still posts a clear sticky comment instead of just a red check.
        continue-on-error: true
        if: steps.scope.outputs.scope == 'dep'
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          git checkout ${{ github.event.pull_request.head.sha }}
          rm -rf node_modules build .docusaurus
          yarn install --frozen-lockfile --no-progress
          yarn build
          mv build build-pr

      - name: Normalize both snapshots
        if: |
          steps.scope.outputs.scope == 'dep'
          && steps.build_base.outcome == 'success'
          && steps.build_head.outcome == 'success'
        run: |
          ./scripts/snapshot-normalize.sh build-base
          ./scripts/snapshot-normalize.sh build-pr

      - name: Compute diff
        id: diff
        if: |
          steps.scope.outputs.scope == 'dep'
          && steps.build_base.outcome == 'success'
          && steps.build_head.outcome == 'success'
        run: |
          # Compare user-facing artifacts only. Exclude:
          #   - `assets/`: webpack output (JS/CSS chunks, LICENSE.txt files,
          #     source maps) — rehashes on every dep bump even with identical
          #     source. References from HTML are normalized separately.
          #   - Binary assets (images, fonts) at any path — never the regression
          #     target of a dep bump.
          # What remains: HTML pages, sitemap.xml, robots.txt, llms-full.txt,
          # RSS/atom feeds — i.e. what we publish to users.
          set +e
          diff -r -u \
            -x 'assets' \
            -x '*.png' -x '*.jpg' -x '*.jpeg' -x '*.gif' -x '*.svg' -x '*.ico' -x '*.webp' \
            -x '*.woff' -x '*.woff2' -x '*.ttf' -x '*.otf' \
            -x '*.json' \
            build-base build-pr > snapshot-diff.txt 2>&1
          DIFF_EXIT=$?
          set -e

          if [ $DIFF_EXIT -eq 0 ]; then
            echo "status=clean" >> "$GITHUB_OUTPUT"
            echo "files_changed=0" >> "$GITHUB_OUTPUT"
            echo "✓ No content changes"
          elif [ $DIFF_EXIT -eq 1 ]; then
            MOD=$(grep -c "^diff " snapshot-diff.txt 2>/dev/null) || true
            ADDED=$(grep -c "^Only in build-pr" snapshot-diff.txt 2>/dev/null) || true
            REMOVED=$(grep -c "^Only in build-base" snapshot-diff.txt 2>/dev/null) || true
            CHANGED=$((MOD + ADDED + REMOVED))
            echo "status=changed" >> "$GITHUB_OUTPUT"
            echo "files_changed=$CHANGED" >> "$GITHUB_OUTPUT"
            echo "✗ $CHANGED files changed (modified=$MOD, added=$ADDED, removed=$REMOVED)"
          else
            echo "::error::diff command exited with $DIFF_EXIT — unexpected error"
            head -50 snapshot-diff.txt
            exit $DIFF_EXIT
          fi

      - name: Check label override
        id: override
        # Use Actions `contains()` for exact array-element match. Substring
        # matching (e.g., `grep snapshot-acknowledged`) would let a label
        # like `not-snapshot-acknowledged` bypass the gate.
        run: |
          echo "acknowledged=${{ contains(github.event.pull_request.labels.*.name, 'snapshot-acknowledged') }}" >> "$GITHUB_OUTPUT"

      - name: Upload diff artifact
        if: |
          steps.scope.outputs.scope == 'dep'
          && steps.build_base.outcome == 'success'
          && steps.build_head.outcome == 'success'
          && steps.diff.outputs.status == 'changed'
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-diff-pr-${{ github.event.pull_request.number }}
          path: snapshot-diff.txt
          retention-days: 30

      - name: Find existing comment
        # No comment for scope=none — doc PRs and other non-dep PRs get a
        # silent green check without spamming a "not applicable" comment.
        if: steps.scope.outputs.scope != 'none'
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: github-actions[bot]
          body-includes: '<!-- snapshot-gate -->'

      - name: Build comment body
        if: steps.scope.outputs.scope != 'none'
        id: comment
        run: |
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BASE_SHA="${{ steps.base.outputs.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          SCOPE="${{ steps.scope.outputs.scope }}"
          NON_DEP_FILES="${{ steps.scope.outputs.non_dep_files }}"
          BASE_BUILD="${{ steps.build_base.outcome }}"
          HEAD_BUILD="${{ steps.build_head.outcome }}"
          STATUS="${{ steps.diff.outputs.status }}"
          CHANGED="${{ steps.diff.outputs.files_changed }}"
          ACK="${{ steps.override.outputs.acknowledged }}"

          {
            echo '<!-- snapshot-gate -->'
            echo "### HTML Snapshot Gate"
            echo ""

            if [ "$SCOPE" = "mixed" ]; then
              echo "ℹ️ **Skipped — mixed-scope PR.**"
              echo ""
              echo "The gate only validates pure dep-bump PRs (only \`package.json\` and/or \`yarn.lock\` changed). This PR also touches non-dep files, so the gate cannot cleanly attribute HTML diffs to dep changes vs. content changes."
              echo ""
              echo "<details>"
              echo "<summary>Files outside dep scope</summary>"
              echo ""
              echo '```'
              echo "$NON_DEP_FILES"
              echo '```'
              echo ""
              echo "</details>"
              echo ""
              echo "If you want this PR's dep changes validated, split into two PRs: one for deps, one for content."
            elif [ "$BASE_BUILD" = "failure" ]; then
              echo "⚠️ **Base build broken — main may be broken, not your PR.**"
              echo ""
              echo "The base commit (\`${BASE_SHA:0:8}\`) failed to build. This is almost certainly a problem with main, not with this PR's changes. File an issue or check recent main commits."
              echo ""
              echo "See the [workflow run](${RUN_URL}) for the build log."
            elif [ "$HEAD_BUILD" = "failure" ]; then
              echo "❌ **PR build broken — this dep bump breaks the Docusaurus build.**"
              echo ""
              echo "The PR head (\`${HEAD_SHA:0:8}\`) failed \`yarn build\`. The proposed dependency change is incompatible with the current codebase."
              echo ""
              echo "Common causes:"
              echo "- New major version of a transitive dep with breaking changes"
              echo "- Stricter schema validation in the bumped package rejecting options passed by another package (e.g., \`webpackbar\` ↔ \`webpack\`)"
              echo "- API removal in the bumped version"
              echo ""
              echo "See the [workflow run](${RUN_URL}) for the build log, then either: (a) close this PR, (b) bump a parent package alongside this one to restore compatibility, or (c) add a \`resolutions\` override."
            elif [ "$STATUS" = "clean" ]; then
              echo "✅ **No content changes** — safe to merge."
            elif [ "$ACK" = "true" ]; then
              echo "✅ **${CHANGED} files changed — acknowledged via \`snapshot-acknowledged\` label**."
            else
              echo "❌ **${CHANGED} files changed** — review required before merge."
              echo ""
              echo "<details>"
              echo "<summary>First 200 lines of unified diff</summary>"
              echo ""
              echo '```diff'
              head -n 200 snapshot-diff.txt
              echo '```'
              echo ""
              echo "</details>"
              echo ""
              echo "If the diff is expected (e.g. webpack runtime change visible on every page), add the \`snapshot-acknowledged\` label to override the gate."
            fi

            echo ""
            echo "Base: \`${BASE_SHA:0:8}\` · Head: \`${HEAD_SHA:0:8}\` · [Workflow run](${RUN_URL})"

            if [ "$STATUS" = "changed" ]; then
              echo ""
              echo "Full diff artifact available on the workflow run page (retention: 30 days)."
            fi
          } > comment.md

          {
            echo 'body<<COMMENT_EOF'
            cat comment.md
            echo 'COMMENT_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create or update PR comment
        # No comment for scope=none — silent success for non-dep PRs.
        if: steps.scope.outputs.scope != 'none'
        # Non-blocking: if the workflow lacks `pull-requests: write` (e.g.,
        # restricted Dependabot token), failing to post the comment must
        # not turn a clean snapshot gate into a red check.
        continue-on-error: true
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: ${{ steps.comment.outputs.body }}
          edit-mode: replace

      - name: Determine final gate result
        if: |
          steps.scope.outputs.scope == 'dep' && (
            steps.build_base.outcome == 'failure'
            || steps.build_head.outcome == 'failure'
            || (steps.diff.outputs.status == 'changed' && steps.override.outputs.acknowledged != 'true')
          )
        run: |
          if [ "${{ steps.build_base.outcome }}" = "failure" ]; then
            echo "::error::Base build failed — main may be broken (commit ${{ steps.base.outputs.sha }})"
          elif [ "${{ steps.build_head.outcome }}" = "failure" ]; then
            echo "::error::PR build broken — this dep bump is incompatible with the codebase"
          else
            echo "::error::Snapshot gate failed — ${{ steps.diff.outputs.files_changed }} files changed without 'snapshot-acknowledged' label"
          fi
          exit 1
