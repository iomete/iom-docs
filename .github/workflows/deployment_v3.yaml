name: Docs Deployment V3

on: workflow_dispatch

jobs:
  production:
    name: documentation-deployment-v3
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: "yarn"
      - run: yarn install --no-progress --frozen-lockfile
      - run: yarn build
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.s3_bucket_region }}

      - name: S3 Sync
        run: |
          # Content-hashed build output (main.<hash>.js, styles.<hash>.css, hashed images, etc.)
          # gets a new filename on every deploy, so it's safe to cache for a year as immutable.
          aws s3 sync build/assets/ s3://${{ secrets.s3_bucket_name }}/resources/assets \
            --cache-control "public, max-age=31536000, immutable"

          # Unhashed static passthrough content: blog cover thumbnails referenced by
          # frontmatter URL and self-hosted fonts. These effectively never change in
          # place (new content gets new filenames), so a 30-day browser cache is safe
          # and stops repeat visitors re-downloading them daily. The CloudFront
          # invalidation below still refreshes the edge on every release.
          aws s3 sync build/img/ s3://${{ secrets.s3_bucket_name }}/resources/img \
            --cache-control "public, max-age=2592000"
          aws s3 sync build/fonts/ s3://${{ secrets.s3_bucket_name }}/resources/fonts \
            --cache-control "public, max-age=2592000"

          # Everything else (HTML pages and unhashed static passthrough files like favicons/logos)
          # keeps the existing short-lived cache since their filenames don't change on content updates.
          aws s3 sync build/ s3://${{ secrets.s3_bucket_name }}/resources \
            --delete \
            --exclude "assets/*" \
            --exclude "img/*" \
            --exclude "fonts/*" \
            --cache-control "max-age=86400"

      - name: CloudFront Invalidation
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.cloudfront_distribution_id }} \
            --paths "/resources/*"
